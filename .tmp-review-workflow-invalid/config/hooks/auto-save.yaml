hook:
  id: "hook.auto_save"
  name: "自动保存"
  version: "1.0.0"
  description: "生成后自动保存内容"
  enabled: true

  trigger:
    event: "after_generate"
    node_types:
      - "generate"

  action:
    type: "script"
    config:
      module: "app.hooks.builtin"
      function: "auto_save_content"
      params:
        save_version: true

  priority: 10
  timeout: 30
