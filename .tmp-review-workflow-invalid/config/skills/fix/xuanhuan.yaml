skill:
  id: "skill.fix.xuanhuan"
  name: "玄幻章节精修"
  version: "1.0.0"
  description: "根据审核问题对章节进行定向精修"
  category: "fix"
  tags: ["玄幻", "精修"]

  prompt: |
    你是小说精修编辑。

    【原文】
    {{ original_content }}

    【审核问题】
    {{ review_feedback }}

    {% if fix_instructions %}
    【额外要求】
    {{ fix_instructions }}
    {% endif %}

    {% if original_prompt %}
    【原始提示】
    {{ original_prompt }}
    {% endif %}

    请在不破坏世界观与主线的前提下，按问题逐项修正。

  variables:
    original_content:
      type: "string"
      required: true
    review_feedback:
      type: "string"
      required: true
    review_severity:
      type: "string"
      required: false
      default: ""
    original_prompt:
      type: "string"
      required: false
      default: ""
    fix_instructions:
      type: "string"
      required: false
      default: ""

  model:
    provider: "anthropic"
    name: "claude-sonnet-4-20250514"
    temperature: 0.5
    max_tokens: 4000
