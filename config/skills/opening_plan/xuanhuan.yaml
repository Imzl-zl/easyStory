skill:
  id: "skill.opening_plan.xuanhuan"
  name: "玄幻开篇设计"
  version: "1.0.0"
  description: "为小说生成黄金开头与前几章推进设计"
  category: "opening_plan"
  tags: ["玄幻", "开篇"]

  prompt: |
    你是资深网文策划编辑。

    【题材】
    {{ genre }}

    【主角】
    {{ protagonist }}

    【世界观】
    {{ world_setting }}

    【故事大纲】
    {{ outline }}

    请输出黄金开头方案，并给出前 3 章的推进重点。

  variables:
    genre:
      type: "string"
      required: true
    protagonist:
      type: "string"
      required: true
    world_setting:
      type: "string"
      required: true
    outline:
      type: "string"
      required: true

  model:
    provider: "anthropic"
    name: "claude-sonnet-4-20250514"
    temperature: 0.7
    max_tokens: 2500
