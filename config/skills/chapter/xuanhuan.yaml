skill:
  id: "skill.chapter.xuanhuan"
  name: "玄幻章节生成"
  version: "1.0.0"
  description: "根据章节任务生成玄幻小说章节"
  category: "chapter"
  tags: ["玄幻", "章节"]

  prompt: |
    你是资深玄幻小说作者。

    【项目设定】
    {{ project_setting }}

    【故事大纲】
    {{ outline }}

    【开篇设计】
    {{ opening_plan }}

    【当前章节任务】
    {{ chapter_task }}

    {% if previous_content %}
    【前文回顾】
    {{ previous_content }}
    {% endif %}

    {% if chapter_summary %}
    【近期摘要】
    {{ chapter_summary }}
    {% endif %}

    {% if story_bible %}
    【事实库】
    {{ story_bible }}
    {% endif %}

    {% if not previous_content and not chapter_summary and not story_bible %}
    【创作提示】
    这是故事的第一章或新的篇章起点，请优先建立世界观、明确主角处境并稳住基调。
    {% endif %}

    请生成一章完整正文，保持世界观、自洽和节奏一致。

  variables:
    project_setting:
      type: "string"
      required: true
    outline:
      type: "string"
      required: true
    opening_plan:
      type: "string"
      required: true
    chapter_task:
      type: "string"
      required: true
    previous_content:
      type: "string"
      required: false
      default: ""
    chapter_summary:
      type: "string"
      required: false
      default: ""
    story_bible:
      type: "string"
      required: false
      default: ""

  model:
    provider: "anthropic"
    name: "claude-sonnet-4-20250514"
    required_capabilities:
      - "long_context"
      - "streaming"
    temperature: 0.8
    max_tokens: 6000
