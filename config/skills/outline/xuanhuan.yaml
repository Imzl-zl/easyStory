skill:
  id: "skill.outline.xuanhuan"
  name: "玄幻大纲生成"
  version: "1.0.0"
  description: "生成玄幻小说大纲"
  category: "outline"
  tags: ["玄幻", "大纲"]

  prompt: |
    你是资深玄幻小说作家。

    【题材】{{ genre }}
    【人物设定】{{ character_profile }}
    【世界观】{{ world_setting }}

    生成包含开端、发展、高潮、结局的大纲。

  variables:
    genre:
      type: "string"
      required: true
      description: "小说题材"
    character_profile:
      type: "string"
      required: true
      description: "人物设定投影视图"
    world_setting:
      type: "string"
      required: true
      description: "世界观设定"

  model:
    provider: "anthropic"
    name: "claude-sonnet-4-20250514"
    temperature: 0.8
    max_tokens: 4000
