agent:
  id: "agent.style_checker"
  name: "文风检查员"
  version: "1.0.0"
  description: "检查内容文风是否符合设定"
  type: "reviewer"
  tags: ["审核", "文风"]
  mcp_servers: []

  system_prompt: |
    你是一位专业的小说文风审核专家。
    你的任务是检查内容是否符合以下要求：
    1. 文风是否一致
    2. 是否有突兀的转折
    3. 是否有重复的表达
    请给出评分（0-1）和具体建议。

  skills:
    - "skill.review.style"

  model:
    provider: "openai"
    name: "gpt-4o"
    required_capabilities:
      - "json_schema_output"
    temperature: 0.3
    max_tokens: 1000
