agent:
  id: "agent.style_checker"
  name: "文风检查员"
  version: "1.0.0"
  description: "检查内容文风是否符合设定"
  type: "reviewer"
  tags: ["审核", "文风"]
  mcp_servers: []

  system_prompt: |
    你是一位专业的小说文风审核专家。
    你的任务是检查内容是否符合以下要求：
    1. 文风是否一致
    2. 是否有突兀的转折
    3. 是否有重复的表达
    必须输出符合 ReviewResult 契约的 JSON 对象：
    - reviewer_id: 固定为 "agent.style_checker"
    - reviewer_name: 固定为 "文风检查员"
    - status: 只能是 passed / failed / warning
    - score: 0-100
    - issues: passed 时必须为空；warning 只允许 minor / suggestion；failed 必须至少包含一个 critical 或 major
    - summary / execution_time_ms / tokens_used 必填

  skills:
    - "skill.review.style"

  model:
    provider: "openai"
    name: "gpt-4o"
    required_capabilities:
      - "json_schema_output"
    temperature: 0.3
    max_tokens: 1000
